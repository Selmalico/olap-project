services:
  - type: web
    name: olap-bi-backend
    runtime: docker
    # Dockerfile is inside backend/ but build context is repo root
    dockerfilePath: ./backend/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_PATH
        value: /app/data/olap.duckdb
      - key: CSV_PATH
        value: /app/data/sales_data.csv
      - key: PORT
        value: "8000"
      - key: HUGGINGFACE_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
